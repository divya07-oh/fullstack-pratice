<!DOCTYPE html>
<html>
    <head>
        <title>button style</title>
        <style> 
    .subscribe {
        background-color: rgb(163, 14, 14);
        color: #ffffff;
        border: none;
        height: 35px;
        width: 105px;
        border-radius: 3px;
        cursor:pointer;
        margin-right: 10px;
        transition: opacity 0.15s;
    }
    .subscribe:hover {
        opacity:0.8;
    }
    .subscribe:active {
        opacity:0.4;
    }

    .join{
        background-color: #ffff;
        color:blue;
        border-color: blue;
        border-style: solid;
        height: 35px;
        width:65px;
        border-radius: 3px;
        cursor:pointer;
        transition: background-color 0.15s ,color 0.15s;
    }
    .join:hover {
        background-color: blue;
        color: white;
    }
    .join:active{
        opacity: 0.7;
    }
    .tweet{
        background-color: rgb(5, 100, 224);
        border: none;
        color:#ffff;
        border-radius:18px;
        height: 35px;
        width: 60px;
        font-weight: bold;
        cursor: pointer;
        margin-left: 10px;
        transition: box-shadow 0.15s;
    }
    .tweet:hover{
       box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }
.uber{
    background-color: black;
    color: white;
    border: none;
    margin-left:10px ;
    height: 35px;
    width:115px;
}
.uber:hover{
    opacity: 0.7;
}
.amazon{
    background-color: rgb(238, 215, 6);
    color:black;
    border: none;
    height: 35px;
    width: 145px;
    border-radius: 18px;
    margin-left: 10px;
    margin-right: 10px;
    cursor: pointer;
}
.amazon:hover{
    background-color: rgb(255, 187, 0);
}
.sign{
    background-color: rgb(12, 168, 12);
    color: white;
    border: none;
    padding-left:13px;
    padding-right: 13px;
    padding-bottom: 10px;
    padding-top: 10px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 13;
}
.sign:hover{
    box-shadow: 8px 8px 10px rgba(0, 0, 0, 0.15);
}
</style>
</head>
    <body>
<button class="subscribe">SUBSCRIBE</button>
<button class="join">JOIN</button>
<button class="tweet">Tweet</button>
<button class="uber">Request now</button>
<button class="amazon">Add to Cart</button>
<button class="sign">sign up</button>
</body>
</html>
